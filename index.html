<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الخدمة الذاتية للموظفين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="container fade-in">
        <h1>تسجيل الدخول</h1>
        <p class="subtitle">مرحباً بك مجدداً، يرجى إدخال بياناتك</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">دخول</button>
        </form>
    </div>

    <!-- لوحة التحكم (Dashboard) -->
    <div id="dashboard-screen" class="container fade-in hidden">
        <div class="dashboard-header">
            <h1 class="welcome-msg">أهلاً، <span id="employee-name">موظف</span> 👋</h1>
            <p class="subtitle">لوحة التحكم اليومية</p>
        </div>

        <div class="status-card">
            <p class="status-label">حالة اليوم</p>
            <p id="attendance-status" class="status-time">لم يتم تسجيل الحضور بعد</p>
        </div>

        <div class="attendance-actions">
            <button id="btn-checkin" class="btn btn-checkin">تسجيل حضور</button>
            <button id="btn-checkout" class="btn btn-checkout" disabled>تسجيل انصراف</button>
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <a href="#" id="logout-link" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">تسجيل الخروج</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
