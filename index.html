<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام ERP المتكامل</title>
    <link rel="stylesheet" href="auth_style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <!-- جانب تسجيل الدخول -->
            <div class="auth-side login-side active" id="login-section">
                <header>
                    <h2>أهلاً بك مجدداً</h2>
                    <p>قم بتسجيل الدخول للوصول إلى لوحة التحكم</p>
                </header>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">البريد الإلكتروني</label>
                        <input type="email" id="login-email" required placeholder="name@company.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">كلمة المرور</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">تسجيل الدخول</button>
                </form>
                <footer>
                    <span>ليس لديك حساب؟</span>
                    <button class="btn-link" onclick="toggleAuth('signup')">إنشاء حساب جديد</button>
                </footer>
            </div>

            <!-- جانب إنشاء الحساب -->
            <div class="auth-side signup-side" id="signup-section">
                <header>
                    <h2>ابدأ رحلتك معنا</h2>
                    <p>أنشئ حساباً جديداً لشركتك الآن</p>
                </header>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="company-name">اسم الشركة</label>
                        <input type="text" id="company-name" required placeholder="شركة الحلول المتكاملة">
                    </div>
                    <div class="form-group">
                        <label for="signup-email">البريد الإلكتروني</label>
                        <input type="email" id="signup-email" required placeholder="admin@company.com">
                    </div>
                    <div class="form-group">
                        <label for="signup-password">كلمة المرور</label>
                        <input type="password" id="signup-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary" id="btn-signup">إنشاء الحساب</button>
                </form>
                <footer>
                    <span>لديك حساب بالفعل؟</span>
                    <button class="btn-link" onclick="toggleAuth('login')">تسجيل الدخول</button>
                </footer>
            </div>
        </div>
    </div>

    <!-- رسائل التنبيه -->
    <div id="status-container" class="status-msg"></div>

    <script src="auth.js"></script>
</body>
</html>
