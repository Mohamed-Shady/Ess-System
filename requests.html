<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | نظام ERP</title>
    <link rel="stylesheet" href="requests_style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="company_name_display">بوابة طلبات الموظف</h1>
            <p>تقديم ومتابعة طلبات الإجازات والسلف</p>
        </header>

        <div id="status-container" class="status-msg"></div>

        <div class="portal-card">
            <h2>تقديم طلب جديد</h2>
            <form id="request-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="request_type">نوع الطلب</label>
                        <select id="request_type" required>
                            <option value="">اختر...</option>
                            <option value="leave">إجازة</option>
                            <option value="loan">سلفة</option>
                            <option value="permission">استئذان</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="start_date">من تاريخ</label>
                        <input type="date" id="start_date" required>
                    </div>
                    <div class="form-group">
                        <label for="end_date">إلى تاريخ</label>
                        <input type="date" id="end_date" required>
                    </div>
                </div>

                <div id="loan-field" class="form-group loan-amount-field">
                    <label for="amount">مبلغ السلفة (ريال)</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="reason">السبب</label>
                    <textarea id="reason" rows="3" required placeholder="يرجى كتابة التفاصيل..."></textarea>
                </div>

                <button type="submit" class="btn-submit">إرسال الطلب</button>
            </form>
        </div>

        <div class="portal-card">
            <h2>سجل طلباتي</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>النوع</th>
                            <th>السبب</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="my-requests-body">
                        <tr><td colspan="4" style="text-align:center; padding: 20px;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="requests.js"></script>
</body>
</html>
